<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Hello Kitty</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial;
}

#scene{
    position:relative;
    width:100%;
    height:100%;
    background:url("104be3a230ca00148c8b279c1395edcc.jpg") center/cover no-repeat;
}

/* هالو كيتي */
#kitty{
    position:absolute;
    width:230px;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    transition:left 1.2s ease, top 1.2s ease;
    cursor:pointer;
    animation:idle 2.5s infinite ease-in-out;
}

@keyframes idle{
    0%{transform:translateX(-50%) scale(1);}
    50%{transform:translateX(-50%) scale(1.05);}
    100%{transform:translateX(-50%) scale(1);}
}

/* بوسة */
.kiss{
    animation:kiss 0.9s ease;
}

@keyframes kiss{
    0%{transform:translateX(-50%) scale(1);}
    50%{transform:translateX(-50%) scale(1.15);}
    100%{transform:translateX(-50%) scale(1);}
}

/* حركة سناب 🫰 */
.snap{
    animation:snap 0.6s ease;
}

@keyframes snap{
    0%{transform:translateX(-50%) rotate(0deg);}
    25%{transform:translateX(-50%) rotate(10deg);}
    50%{transform:translateX(-50%) rotate(-10deg);}
    100%{transform:translateX(-50%) rotate(0deg);}
}

/* فقاعة الكلام */
#bubble{
    position:absolute;
    background:white;
    padding:12px 16px;
    border-radius:20px;
    font-size:16px;
    display:none;
    box-shadow:0 5px 15px rgba(0,0,0,.25);
    white-space:nowrap;
}

#hint{
    position:absolute;
    bottom:12px;
    width:100%;
    text-align:center;
    color:white;
    font-size:14px;
    text-shadow:0 2px 5px rgba(0,0,0,.6);
}

</style>
</head>
<body>

<div id="scene">

    <div id="bubble"></div>

    <img id="kitty" src="kitty.png">

    <div id="hint">إلمس هالو كيتي 🌸</div>

    <audio id="song" src="EI2oxQd95z4.mp3"></audio>

</div>

<script>

const kitty = document.getElementById("kitty");
const bubble = document.getElementById("bubble");
const song   = document.getElementById("song");

const messages = [
    "هاي بوسة إلك 😘",
    "اسمعي… 🫰",
    "أنتِ كتير لطيفة 💖",
    "لا تزعلـي أبداً 🌸",
    "هسه شغّلت الأغنية 🎵"
];

let step = 0;
let started = false;

function moveKitty(){
    const maxX = window.innerWidth  - 240;
    const maxY = window.innerHeight - 260;

    const x = Math.random()*maxX;
    const y = Math.random()*maxY;

    kitty.style.left = x+"px";
    kitty.style.top  = y+"px";
}

function showBubble(text){
    bubble.innerText = text;
    bubble.style.display="block";

    const r = kitty.getBoundingClientRect();
    bubble.style.left = (r.left + r.width/2)+"px";
    bubble.style.top  = (r.top - 45)+"px";
    bubble.style.transform="translateX(-50%)";
}

function doKiss(){
    kitty.classList.remove("snap");
    kitty.classList.add("kiss");
    setTimeout(()=>kitty.classList.remove("kiss"),900);
}

function doSnap(){
    kitty.classList.remove("kiss");
    kitty.classList.add("snap");
    setTimeout(()=>kitty.classList.remove("snap"),600);
}

function startShow(){

    if(started) return;
    started = true;

    document.getElementById("hint").style.display="none";

    moveKitty();
    showBubble(messages[0]);
    doKiss();

    let timer = setInterval(()=>{

        step++;

        moveKitty();

        if(step === 1){
            showBubble(messages[1]);
            doSnap();
        }
        else if(step === 2){
            showBubble(messages[2]);
        }
        else if(step === 3){
            showBubble(messages[3]);
        }
        else if(step === 4){
            showBubble(messages[4]);
            song.play().catch(()=>{});
        }
        else{
            clearInterval(timer);
        }

    },1500);
}

/* أول لمسة */
kitty.addEventListener("click",startShow);
kitty.addEventListener("touchstart",startShow);

</script>

</body>
</html>
