<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 برنسيسة معتصم 👑</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap');
        body { background: #fff5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Cairo', sans-serif; overflow: hidden; }
        .main-card { background: white; border-radius: 40px; padding: 40px; box-shadow: 0 20px 50px rgba(173, 20, 87, 0.1); text-align: center; border-right: 8px solid #ad1457; width: 85%; max-width: 450px; position: relative; }
        .kitty-img { width: 150px; animation: float 3s infinite ease-in-out; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        h1 { color: #ad1457; font-family: 'Amiri', serif; font-size: 1.4rem; line-height: 1.8; min-height: 150px; }
        .btn-magic { background: #ad1457; border: none; padding: 12px 40px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #ui-area input { padding: 12px; border-radius: 15px; border: 2px solid #f48fb1; width: 80%; text-align: center; margin-bottom: 20px; outline: none; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .heart { position: absolute; color: #ad1457; pointer-events: none; animation: flyUp 3s linear forwards; }
        @keyframes flyUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100vh); opacity: 0; } }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="kitty-header">
            <img src="https://raw.githubusercontent.com/Amaze22-max/hello-kitty/main/kitty.jpg" onerror="this.src='https://i.pinimg.com/originals/f3/d3/1a/f3d31a57c834a0499d3066d56d116c90.png'" class="kitty-img">
        </div>
        <h1 id="display-text">هلا بست البنات.. <br>هلا ببرنسيسة معتصم ❤️✨</h1>
        <div id="ui-area">
            <input type="text" id="nameInput" placeholder="اكتبي اسمك يا أميرة...">
            <br>
            <button class="btn-magic" onclick="startJourney()">ادخلي لقلبي 💖</button>
        </div>
    </div>
    <script>
        let step = 0; let userName = "";
        const verses = [
            "يا [NAME].. يا وجهاً تبارك فيه ربي، <br> يا أجمل من رأت عينايَ دربي.. 😍",
            "أريدكِ سـنـداً لي، وأنيساً لـوحشتي، <br> ورفيقاً لظلامِ دربي، ووليفةً لقلبي.. ✨",
            "فأنتِ الكفايةُ التي لا أرجو بعدها أحداً، <br> وأنتِ الغايةُ التي استوطنت لُبّي.. 💍"
        ];
        function createHearts() {
            for(let i=0; i<10; i++) {
                const h = document.createElement('div'); h.className = 'heart'; h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw'; h.style.fontSize = '20px';
                h.style.top = '100vh'; document.body.appendChild(h);
                setTimeout(() => h.remove(), 3000);
            }
        }
        function startJourney() {
            if (step === 0) {
                userName = document.getElementById('nameInput').value;
                if (!userName) return;
                document.getElementById('ui-area').innerHTML = '<button class="btn-magic" onclick="startJourney()">وبعدين؟ ❤️</button>';
            }
            createHearts();
            if (step < verses.length) {
                document.getElementById('display-text').innerHTML = verses[step].replace("[NAME]", userName);
                step++;
            } else {
                document.getElementById('display-text').innerHTML = `
                <div style="font-size: 1.1rem;">في شخص مجنون بدباديبك اسمه <b>معتصم</b> حب يوصلك هل رسالة:<br><br>
                <span style="font-size: 1.3rem; background: #fff0f5; padding: 5px;">"أريدكِ سـنـداً لي وأنيساً لوحشتي، ورفيقاً لظلامِ دربي، ووليفةً لقلبي."</span></div>`;
                document.getElementById('ui-area').style.display = "none";
                setInterval(createHearts, 1000);
            }
        }
    </script>
</body>
</html>
