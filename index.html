<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة إيلاف من معتصم ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background: #fff5f7;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* كيتي المقصوصة والمتحركة */
        .kitty-character {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 130px;
            z-index: 1000;
            cursor: pointer;
            clip-path: inset(5% 15% 10% 15% round 30%);
            animation: kittyVibe 2s infinite ease-in-out;
            transition: all 0.5s;
        }

        @keyframes kittyVibe {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.1) translateY(-10px); }
        }

        /* فقاعة الكلام */
        .speech-bubble {
            position: fixed;
            bottom: 160px;
            right: 40px;
            background: white;
            padding: 20px;
            border-radius: 25px;
            border: 3px solid #ff4d6d;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.3);
            max-width: 250px;
            text-align: center;
            font-weight: bold;
            color: #d63384;
            z-index: 1001;
            display: block;
            line-height: 1.6;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            right: 40px;
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: white transparent transparent;
        }

        .main-container {
            max-width: 500px;
            width: 90%;
            background: white;
            padding: 35px;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #ffd1dc;
            display: none;
        }

        .player-box {
            background: #cc0000;
            border: 6px solid #a00000;
            border-radius: 20px;
            margin: 25px 0;
            overflow: hidden;
        }

        iframe { width: 100%; height: 90px; border: none; }

        .btn-yes {
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }
    </style>
</head>
<body>

    <div id="bubble" class="speech-bubble">يا هلا يا هلا بأحلى إيلاف بالكون! ✨</div>
    <div class="kitty-character" onclick="chat()">
        <img src="kitty.jpg" style="width: 100%;" alt="Kitty">
    </div>

    <div class="main-container" id="content">
        <h1 style="color: #ff4d6d; font-family: 'Amiri'; font-size: 2.5em;">إلى إيلاف.. قلبي ❤️</h1>
        <div class="player-box">
            <div style="color:white; padding:5px; font-weight:bold;">🎵 محمود التركي - حبيبي هو</div>
            <iframe src="https://www.youtube.com/embed/SshsX6YI2jQ"></iframe>
        </div>
        <p style="font-size: 1.2em; color: #555;">معتصم بيوعدك يضل يحبك للأبد..</p>
        <button class="btn-yes" onclick="done()">سامحتك يا معتصم</button>
    </div>

    <script>
        let msgIndex = 0;
        const messages = [
            "يا هلا يا هلا بأحلى إيلاف بالكون! ✨",
            "بتعرفي يا إيلاف؟ أنا مصدومة! عمري ما شفت حد بيحب حد زي ما معتصم بيحبك 🙀",
            "معتصم كل يوم بيحكيلي عنك، عن جمالك وطيبة قلبك.. إنتي فعلاً أميرة 👑",
            "بصراحة.. معتصم ضايع بدونك، ومستعد يعمل المستحيل بس لتضحكي 🥺",
            "شوفي هالأغنية والكلام اللي جهزه إلك.. اضغطي عليّ آخر مرة!",
            "أنا رح أترككم هسا.. بس أمانة سامحي المسكين معتصم يا إيلاف ❤️"
        ];

        function chat() {
            msgIndex++;
            const bubble = document.getElementById('bubble');
            const content = document.getElementById('content');
            
            if (msgIndex < messages.length) {
                bubble.innerText = messages[msgIndex];
                document.querySelector('.kitty-character').style.transform = 'scale(1.3)';
                setTimeout(() => {
                    document.querySelector('.kitty-character').style.transform = 'scale(1)';
                }, 300);
            } else {
                bubble.style.display = 'none';
                document.querySelector('.kitty-character').style.transform = 'scale(0.8) translateY(40px)';
                content.style.display = 'block';
            }
        }

        function done() {
            fetch(`https://api.telegram.org/bot8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY/sendMessage?chat_id=8115519784&text=${encodeURIComponent("🎉 إيلاف سامحتك يا معتصم! ❤️")}`);
            alert("أحلى خبر! معتصم هسا طاير من الفرح ❤️");
        }
    </script>
</body>
</html>
