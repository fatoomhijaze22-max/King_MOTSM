<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى جنى ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background: #fff5f7;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* كيتي الصغيرة والمتحركة (مقصوصة برمجياً) */
        .kitty-mini {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 100px; /* حجم صغير ومناسب */
            z-index: 1000;
            cursor: pointer;
            /* قص الصورة لإظهار وجه كيتي فقط */
            clip-path: inset(10% 10% 10% 10% round 20%); 
            animation: kittyMove 3s ease-in-out infinite;
        }

        @keyframes kittyMove {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .bubble {
            position: fixed;
            bottom: 120px;
            right: 20px;
            background: white;
            padding: 10px 15px;
            border-radius: 20px;
            border: 2px solid #ff4d6d;
            font-size: 0.9em;
            display: none;
            z-index: 1001;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 500px;
            width: 90%;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2);
            text-align: center;
            border: 1px solid #ffd1dc;
        }

        .player-card {
            background: #cc0000;
            border-radius: 15px;
            padding: 10px;
            margin: 20px 0;
            border: 5px solid #a00000;
        }

        iframe { width: 100%; height: 80px; border-radius: 10px; border: none; }

        .poem {
            font-family: 'Amiri', serif;
            font-size: 1.4em;
            background: #fffafa;
            padding: 15px;
            border-radius: 10px;
            border-right: 5px solid #ff4d6d;
            line-height: 1.8;
        }

        .btn-yes {
            background: #ff4d6d;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="bubble" class="bubble">جنى.. معتصم بيحبك! ❤️</div>

    <div class="kitty-mini" onclick="showTalk()">
        <img src="kitty.jpg" style="width: 100%;" alt="Kitty">
    </div>

    <div class="container">
        <h1 style="color: #ff4d6d; font-family: 'Amiri';">إلى جنى.. ❤️</h1>
        
        <div class="player-card">
            <div style="color:white; margin-bottom:5px; font-weight:bold;">🎵 محمود التركي - حبيبي هو</div>
            <iframe src="https://www.youtube.com/embed/SshsX6YI2jQ"></iframe>
        </div>

        <div class="poem">
            أعاتبُ قلبي فيكِ إن زادَ نبضُـهُ <br>
            فأنتِ لهُ النبضاتُ، وأنتِ لهُ الصدرُ <br>
            <br>
            خُـذي الوعـدَ مِني، لا بـديلَ لـحبِّـنا
        </div>

        <button class="btn-yes" onclick="sendToTelegram()">سامحتك يا معتصم</button>
    </div>

    <script>
        function showTalk() {
            const b = document.getElementById('bubble');
            b.style.display = 'block';
            setTimeout(() => b.style.display = 'none', 3000);
        }

        function sendToTelegram() {
            alert("شكراً يا جنى! ❤️");
            fetch(`https://api.telegram.org/bot8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY/sendMessage?chat_id=8115519784&text=${encodeURIComponent("🎉 جنى سامحتك يا معتصم وكيتي سلمت عليها! ❤️")}`);
        }
    </script>
</body>
</html>
