
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إلى سيرين (سوسو) 💖</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family: 'Arial', sans-serif;
}

#scene{
  width:100%;
  height:100%;
  position:relative;
  background:url("IMG_20260303_145837_547.jpg") center/cover no-repeat;
  background-color: #ffeef8; 
}

#kitty{
  position:absolute;
  width:450px;
  left:50%;
  top:55%;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 15px 25px rgba(0,0,0,.3));
  animation:softIdle 4s infinite ease-in-out;
  transition:left 2.2s ease, top 2.2s ease;
  cursor:pointer;
  z-index:5;
}

@keyframes softIdle{
  0%{transform:translate(-50%,-50%) rotate(0deg) scale(1);}
  25%{transform:translate(-50%,-50%) rotate(1.2deg) scale(1.02);}
  50%{transform:translate(-50%,-50%) rotate(0deg) scale(1.04);}
  75%{transform:translate(-50%,-50%) rotate(-1.2deg) scale(1.02);}
  100%{transform:translate(-50%,-50%) rotate(0deg) scale(1);}
}

#bubble{
  position:absolute;
  background:rgba(255, 255, 255, 0.95);
  padding:22px 28px;
  border-radius:35px;
  font-size:22px;
  color: #c2185b;
  line-height:1.8;
  white-space:pre-wrap;
  display:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  z-index:10;
  max-width:85%;
  text-align:center;
  border: 2px solid #fce4ec;
}

.fx{
  position:absolute;
  pointer-events:none;
  animation:fall 3.5s linear forwards;
  font-size:28px;
  z-index:3;
}

@keyframes fall{
  from{transform:translateY(-30px);opacity:1;}
  to{transform:translateY(400px);opacity:0;}
}

.pose1{animation:pose1 .6s infinite alternate!important;}
.pose2{animation:pose2 .6s infinite alternate!important;}
.pose3{animation:pose3 .6s infinite alternate!important;}

@keyframes pose1{ from{transform:translate(-50%,-50%) rotate(-6deg) scale(1.05);} to{transform:translate(-50%,-50%) rotate(6deg) scale(1.05);} }
@keyframes pose2{ from{transform:translate(-50%,-50%) rotate(0deg) scale(1.08);} to{transform:translate(-50%,-50%) rotate(0deg) scale(.98);} }
@keyframes pose3{ from{transform:translate(-50%,-50%) rotate(4deg) scale(1.03);} to{transform:translate(-50%,-50%) rotate(-4deg) scale(1.03);} }

#hint{
  position:absolute;
  bottom:15px;
  width:100%;
  text-align:center;
  color:white;
  font-size:17px;
  text-shadow:0 2px 6px rgba(0,0,0,.6);
  z-index:12;
}

#player {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}
</style>
</head>
<body>

<div id="scene">
  <div id="bubble"></div>
  <img id="kitty" src="kitty.png">
  <div id="hint">إلمسي هالو كيتي يا سوسو 🌸</div>
  <div id="player"></div>
</div>

<script>
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

var player;
function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '0',
    width: '0',
    videoId: '0q9epNeP0GU',
    playerVars: {
      'start': 35, 
      'autoplay': 0,
      'controls': 0
    }
  });
}

const kitty  = document.getElementById("kitty");
const bubble = document.getElementById("bubble");
const hint   = document.getElementById("hint");

let started=false;
let step=0;
let typingTimer=null;

/* نصوص تعبر عن الاندهاش من حب مؤمن لسيرين */
const texts=[
  "يا هلا بـ سوسو.. أحلى سيرين بالدنيا 💖",
  "ولك يا بنت شو عاملة بمؤمن؟ إنتِ ساحريته؟! 🪄✨",
  "الزلمة حرفياً مش شايف غيرك، ولا عارف يحب حد بعدك..\nكأنك ملكتِ عقله وقلبه وكل كيانه! 💎",
  "بيقول إنك عهده اللي ما بينكسر، وأمانته اللي رح يحميها بعيونه.. \nوالله اني انصدمت من كتر ما غلاوتك عنده عالية! 🌷",
  "اسمعي هالشعر اللي كتبه لعيونك:\n'أنتِ الحبيبةُ التي أرجو مَحبتَهَا\nوما سِواكِ بقلبي قطُّ مَسكُونُ'",
  "'لو كُنتِ تَعلمينَ ما في القلبِ من شَغَفٍ\nلَعذرتِ قلباً بحبِّكِ اليومَ مَفتُونُ' 🌸",
  "سيرين.. مؤمن ماسك فيكِ لأبعد حد.. \nصالحيه وخلي الضحكة ترجع تنور وجهك 💖"
];

function moveSmall(){
  const cx = window.innerWidth/2;
  const cy = window.innerHeight/2;
  const x = cx + (Math.random()*100-50);
  const y = cy + (Math.random()*80-40);
  kitty.style.left = x+"px";
  kitty.style.top  = y+"px";
}

function typeText(text){
  if(typingTimer) clearInterval(typingTimer);
  bubble.style.display="block";
  bubble.innerText="";
  
  const r=kitty.getBoundingClientRect();
  bubble.style.left=(r.left+r.width/2)+"px";
  bubble.style.top =(r.top-130)+"px";
  bubble.style.transform="translateX(-50%)";

  let i=0;
  typingTimer=setInterval(()=>{
    bubble.innerText+=text[i];
    i++;
    if(i>=text.length){
      clearInterval(typingTimer);
      typingTimer=null;
    }
  },60);
}

function startFX(){
  setInterval(()=>{
    const el=document.createElement("div");
    el.className="fx";
    const arr=["🌸","💖","✨","🌷","💎","🎀"];
    el.innerText=arr[Math.floor(Math.random()*arr.length)];
    el.style.left=Math.random()*window.innerWidth+"px";
    el.style.top="-20px";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  },400);
}

function startShow(){
  if(started) return;
  started=true;
  hint.style.display="none";
  startFX();
  
  const talkTimer=setInterval(()=>{
    if(step < texts.length){
      typeText(texts[step]);
      moveSmall();
      step++;
    } else {
      clearInterval(talkTimer);
      if(player) player.playVideo();
      kitty.classList.add("pose1");
      setInterval(()=> {
         const poses=["pose1","pose2","pose3"];
         kitty.className="";
         kitty.classList.add(poses[Math.floor(Math.random()*3)]);
      }, 800);
      typeText("بتوحشيني.. وقلتلك! 🎤💃\nصالحي مؤمن يا سيرين.. الزلمة غرقان بحبك! ❤️");
    }
  },4800);
}

kitty.addEventListener("click",startShow);
kitty.addEventListener("touchstart",startShow);

</script>
</body>
</html>
