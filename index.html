<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 لمفاجأة ست البنات 🎀</title>
    <style>
        body { background-color: #ffeef8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #box { background: white; border-radius: 25px; padding: 30px; box-shadow: 0 15px 30px #ffb6c1; text-align: center; border: 4px solid #ffb6c1; width: 85%; max-width: 400px; position: relative; z-index: 10; }
        .kitty-container { position: relative; display: block; margin-bottom: 20px; }
        
        /* هاد السطر رح يخلي الصورة واضحة وبحجم مثالي */
        .kitty-img { width: 180px; height: auto; transition: 0.3s; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        
        h1 { color: #d63384; font-size: 1.3rem; line-height: 1.6; min-height: 80px; }
        input { padding: 12px; border-radius: 12px; border: 2px solid #ffb6c1; width: 80%; outline: none; text-align: center; font-size: 16px; margin-bottom: 10px; }
        button { background: #ffb6c1; border: none; padding: 12px 30px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        #kiss { position: absolute; top: 0; left: 50%; transform: translateX(-50%); font-size: 50px; opacity: 0; pointer-events: none; }
        @keyframes kissAnimation {
            0% { opacity: 0; transform: translateX(-50%) scale(0.5); }
            50% { opacity: 1; transform: translateX(-50%) scale(2); }
            100% { opacity: 0; transform: translateX(-50%) scale(4); top: -150px; }
        }
        .falling-item { position: absolute; top: -20px; font-size: 20px; z-index: 1; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>
    <div id="box">
        <div class="kitty-container">
            <img src="https://i.pinimg.com/originals/f3/d3/1a/f3d31a57c834a0499d3066d56d116c90.png" class="kitty-img" id="kitty">
            <div id="kiss">❤️</div>
        </div>
        <h1 id="text">أويييييه! أنا هالو كيتي.. <br>ممكن أعرف شو اسم القمر؟ ✨</h1>
        <div id="action-area">
            <input type="text" id="nameInp" placeholder="اكتبي اسمك هون...">
            <br>
            <button onclick="startStory()">إرسال 🎀</button>
        </div>
    </div>

    <script>
        let step = 0; let userName = "";
        const story = [
            "يوبشني هالاسم يا [NAME]! بتعرفي إنه هاد أحلى اسم مرق عليّ اليوم؟ 😍",
            "بصراحة.. أنا حاملة بقلبي الصغير أمانة كبيرة من شخص بيحبك.. 🥺",
            "بيحكيلي إنك الصبر والأمل اللي بخليه يبتسم دايماً.. 🌟",
            "وقلي كمان.. إنه روحه معلقة بروحك للأبد.. 💍",
            "جاهزة تشوفي الرسالة اللي انكتبت خصيصاً إلك؟ ❤️"
        ];

        function createEffect() {
            const items = ['🌸', '🌹', '💖', '✨', '🎀'];
            for(let i=0; i<8; i++) {
                setTimeout(() => {
                    const item = document.createElement('div');
                    item.className = 'falling-item';
                    item.innerHTML = items[Math.floor(Math.random() * items.length)];
                    item.style.left = Math.random() * 100 + 'vw';
                    item.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(item);
                    setTimeout(() => item.remove(), 4000);
                }, i * 150);
            }
        }

        function startStory() {
            if (step === 0) {
                userName = document.getElementById('nameInp').value;
                if (!userName) return;
                document.getElementById('nameInp').style.display = "none";
            }
            createEffect();
            if (step < story.length) {
                document.getElementById('text').innerHTML = story[step].replace("[NAME]", userName);
                step++;
            } else {
                document.getElementById('kiss').style.animation = "kissAnimation 1.5s ease-out forwards";
                document.getElementById('text').innerHTML = `<div style="color: #c2185b; font-weight: bold;">
                    ❤️❤️❤️<br>يا ${userName}، أنتي عالمي كله!<br>الله يخليلي ياكي يا نبض القلب! ✨<br>❤️❤️❤️</div>`;
                document.querySelector('button').style.display = "none";
                setInterval(createEffect, 1000);
            }
        }
    </script>
</body>
</html>
