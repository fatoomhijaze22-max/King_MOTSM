
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لجنى ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background: #fff5f7;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* شخصية هالو كيتي المتحركة */
        .kitty-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            z-index: 100;
            cursor: pointer;
            transition: 0.5s;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* فقاعة الكلام */
        .bubble {
            position: absolute;
            bottom: 180px;
            right: 50px;
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 2px solid #ff4d6d;
            max-width: 200px;
            text-align: center;
            font-weight: bold;
            display: none;
            z-index: 101;
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 30px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent;
        }

        .main-card {
            max-width: 500px;
            width: 90%;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2);
            text-align: center;
            display: none; /* مخفي في البداية */
            border: 1px solid #ffd1dc;
        }

        h1 { font-family: 'Amiri', serif; color: #ff4d6d; }

        .player-card {
            background: #cc0000;
            border: 5px solid #a00000;
            border-radius: 15px;
            padding: 10px;
            margin: 20px 0;
        }

        .poem {
            font-family: 'Amiri', serif;
            font-size: 1.4em;
            background: #fffafa;
            padding: 15px;
            border-radius: 10px;
            border-right: 5px solid #ff4d6d;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        .btn-yes { background: #ff4d6d; color: white; }
    </style>
</head>
<body>

    <div id="kittyBubble" class="bubble">أهلاً جنى! ممكن تسمعي معتصم شو بدو يقول؟</div>

    <div class="kitty-container" onclick="nextQuestion()">
        <img src="kitty.jpg" alt="Kitty" style="width: 100%;" id="kittyImg">
    </div>

    <div class="main-card" id="mainCard">
        <h1>إلى جنى.. ❤️</h1>
        <div class="player-card">
            <div style="color:white; margin-bottom:5px;">🎵 محمود التركي - حبيبي هو</div>
            <iframe src="https://www.youtube.com/embed/SshsX6YI2jQ" height="80" style="width:100%; border-radius:10px; border:none;"></iframe>
        </div>
        <div class="poem">
            أعاتبُ قلبي فيكِ إن زادَ نبضُـهُ <br>
            فأنتِ لهُ النبضاتُ، وأنتِ لهُ الصدرُ
        </div>
        <p>سامحتيني؟ 🥺</p>
        <button class="btn btn-yes" onclick="finish()">نعم سامحتك</button>
    </div>

    <script>
        let step = 0;
        const bubble = document.getElementById('kittyBubble');
        const card = document.getElementById('mainCard');
        const kitty = document.querySelector('.kitty-container');

        // إظهار الفقاعة الأولى بعد ثانية
        setTimeout(() => {
            bubble.style.display = 'block';
        }, 1000);

        function nextQuestion() {
            step++;
            if (step === 1) {
                bubble.innerText = "معتصم كثير ندمان.. بتعرفي إنه بيحبك كثير؟";
            } else if (step === 2) {
                bubble.innerText = "طيب شوفي شو حضرلك.. اضغطي عليّ كمان مرة!";
            } else if (step === 3) {
                bubble.style.display = 'none';
                kitty.style.transform = 'scale(0.7) translateY(50px)';
                card.style.display = 'block';
            }
        }

        function finish() {
            card.innerHTML = "<h1>شكراً يا أغلى جنى! ❤️</h1><p>وصلتني الرسالة وبحبك للأبد!</p>";
            fetch(`https://api.telegram.org/bot8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY/sendMessage?chat_id=8115519784&text=${encodeURIComponent("🎉 جنى سامحتك بعد ما حكت مع كيتي! ❤️")}`);
        }
    </script>
</body>
</html>
